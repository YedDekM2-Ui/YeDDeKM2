<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱️ Time Tracking COMPANY</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
 font-family:'Noto Sans Thai',sans-serif;
 background:linear-gradient(135deg,#fed7aa,#fce7f3,#dbeafe);
}
.container{max-width:520px;margin:auto;padding:16px;}
.header{text-align:center;margin-bottom:10px;}
.header h1{
 font-size:22px;
 background:linear-gradient(135deg,#ea580c,#9333ea,#ec4899);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}
.card{
 background:#fff;
 border-radius:14px;
 padding:14px;
 margin-bottom:12px;
}
input{
 width:100%;
 padding:10px;
 margin:6px 0;
 border:2px solid #fed7aa;
 border-radius:8px;
}
button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 font-weight:700;
 margin-top:6px;
}
.add{background:#ea580c;color:#fff;}
.record{
 background:#fff;
 border-radius:10px;
 padding:10px;
 margin-top:8px;
 border-left:6px solid #fed7aa;
}
.wednesday{background:#fffbeb;border-left:#f59e0b 6px solid;}
.holiday{background:#fffacd;border-left:#facc15 6px solid;}
.summary{
 background:#eef2ff;
 border:2px solid #7c3aed;
 padding:10px;
 border-radius:10px;
 margin-top:10px;
 text-align:center;
 font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>⏱️ Time Tracking COMPANY</h1>
</div>

<div class="card">
<input type="date" id="date">
<input type="time" id="in" value="09:00">
<input type="time" id="out" value="18:00">
<input type="number" id="customOT" placeholder="OT เพิ่ม">
<input type="number" id="special" placeholder="ค่าเดินทางพิเศษ">

<button class="add" onclick="add()">+ เพิ่ม</button>
</div>

<div id="list"></div>

</div>

<script>

// ====== CONFIG ======
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1-siPR8NwN3wqatR3y6w8IJ-PtepFJnTzDFtjDsrJ8sg/gviz/tq?tqx=out:csv&sheet=Holidays";

let holidays=[];
let db=JSON.parse(localStorage.getItem("db"))||[];
let ready=false;

// ====== LOAD HOLIDAY ======
async function loadHoliday(){
 try{
  let res=await fetch(SHEET_URL);
  let txt=await res.text();

  holidays = txt.split("\n")
   .map(r=>r.split(",")[0])
   .filter(d=>d.match(/^\d{4}-/));

  ready=true;

 }catch(e){
  alert("โหลดวันหยุดไม่สำเร็จ");
 }
}

// ====== HELP ======
function t(v){let[a,b]=v.split(":");return +a+(b/60)}

function dayType(d){
 if(holidays.includes(d)) return "holiday";
 if(new Date(d).getDay()==3) return "wednesday";
 return "normal";
}

function getPeriod(d){
 let x=new Date(d);
 let y=x.getFullYear(),m=x.getMonth();

 if(x.getDate()<26){
  m--;
  if(m<0){m=11;y--;}
 }

 return y+"-"+(m+1);
}

// ====== CALC ======
function calc(r){

 let i=t(r.in),o=t(r.out);
 if(o<i)o+=24;

 let t100=0,t150=0,t200=0,tr=0;
 let type=dayType(r.date);

 if(type=="normal"){
  t100=Math.max(0,Math.min(o,23)-Math.max(i,18));
  if(i<9)t150+=(9-i);
  if(o>23)t150+=(o-23);
 }

 if(type=="wednesday"||type=="holiday"){
  t150=Math.max(0,Math.min(o,23)-Math.max(i,9));
  if(i<9)t200+=(9-i);
  if(o>23)t200+=(o-23);
 }

 if(o>=23) tr=200;

 let total=
 t100*100+
 t150*150+
 t200*200+
 (r.custom||0)+
 tr+
 (r.special||0);

 return {t100,t150,t200,tr,total};
}

// ====== ADD ======
function add(){

 if(!ready){
  alert("กำลังโหลดวันหยุด...");
  return;
 }

 if(!date.value || !in.value || !out.value){
  alert("กรอกให้ครบ");
  return;
 }

 let r={
  id:Date.now(),
  date:date.value,
  in:in.value,
  out:out.value,
  custom:+customOT.value||0,
  special:+special.value||0
 };

 db.push(r);
 localStorage.setItem("db",JSON.stringify(db));

 render();
}

// ====== DELETE ======
function del(id){
 db=db.filter(x=>x.id!=id);
 localStorage.setItem("db",JSON.stringify(db));
 render();
}

// ====== RENDER ======
function render(){

 let box={};
 let html="";

 db.forEach(r=>{
  let p=getPeriod(r.date);
  if(!box[p])box[p]=[];
  box[p].push(r);
 });

 Object.keys(box).sort().reverse().forEach(p=>{

  let sum=0;

  box[p].forEach(r=>{
   sum+=calc(r).total;
  });

  html+=`<div class="summary">รอบ ${p}<br>฿${sum}</div>`;

  box[p].forEach(r=>{
   let c=calc(r);

   html+=`
   <div class="record ${dayType(r.date)}">
   ${r.date}<br>
   ${r.in} - ${r.out}<br>
   100:${c.t100.toFixed(2)} / 150:${c.t150.toFixed(2)} / 200:${c.t200.toFixed(2)}<br>
   🚗 ${c.tr + (r.special||0)}<br>
   💰 ${c.total}
   <br><button onclick="del(${r.id})">ลบ</button>
   </div>`;
  });

 });

 list.innerHTML=html;
}

// ====== START ======
function init(){
 document.getElementById("date").value =
 new Date().toISOString().split("T")[0];

 loadHoliday().then(render);
}

init();

</script>

</body>
</html>
