<!-- 🔥 ใช้แทนไฟล์เดิมทั้งก้อน -->
<script>

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxq2Rd3oPL7UEW8Pe4b1sS0zSxvm8b_vcnZ32-MyaZN2kt8D01Q4qajzjLkXvjB2Tgc/exec';

const CONFIG = {
    SALARY: 17000,
    ALLOWANCE: 2000,
    SOCIAL_SEC: 850,
    FIRST_PAYMENT: 16150,
    TRANSPORT: 200,
    OT100_RATE: 100,
    OT150_RATE: 150,
    OT200_RATE: 200,
    OT100_START: 18
};

let records = [];

// =========================
// 📥 LOAD FROM SHEET
// =========================
async function loadFromSheet() {
    try {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();

        records = data.map(r => ({
            id: Date.now() + Math.random(),
            date: r.date,
            timeIn: r.timeIn,
            timeOut: r.timeOut,
            customOT: Number(r.customOT) || 0,
            specialTransport: Number(r.specialTransport) || 0
        }));

        localStorage.setItem('timeRecords_2026', JSON.stringify(records));
        render();

    } catch (err) {
        console.log("ใช้ local แทน");
        records = JSON.parse(localStorage.getItem('timeRecords_2026')) || [];
        render();
    }
}

// =========================
// ⏱ TIME
// =========================
function timeToDecimal(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return h + m / 60;
}

// =========================
// 📅 DAY TYPE
// =========================
function getDayType(dateStr) {
    const date = new Date(dateStr);
    if (date.getDay() === 3) return 'พุธ';
    return 'ปกติ';
}

// =========================
// 💰 OT CALC
// =========================
function calculateOT(record) {

    const dayType = getDayType(record.date);
    const timeIn = timeToDecimal(record.timeIn);
    let timeOut = timeToDecimal(record.timeOut);

    if (timeOut < timeIn) timeOut += 24;

    let ot100 = 0, ot150 = 0, ot200 = 0, transport = 0;

    if (dayType === 'ปกติ') {

        ot100 = Math.max(0, Math.min(timeOut, 23) - Math.max(timeIn, 18));

        if (timeIn < 9) ot150 += (9 - timeIn);
        if (timeOut > 23) ot150 += (timeOut - 23);

    } else {
        ot150 = Math.max(0, Math.min(timeOut, 23) - Math.max(timeIn, 9));
    }

    if (timeOut >= 23) transport = CONFIG.TRANSPORT;

    const otTotal =
        ot100 * CONFIG.OT100_RATE +
        ot150 * CONFIG.OT150_RATE +
        ot200 * CONFIG.OT200_RATE +
        (record.customOT || 0);

    return {
        total: otTotal + transport + (record.specialTransport || 0),
        otOnly: otTotal,
        transport: transport + (record.specialTransport || 0)
    };
}

// =========================
// ➕ ADD
// =========================
function addRecord() {

    const date = inputDate.value;
    const timeIn = inputTimeIn.value;
    const timeOut = inputTimeOut.value;

    const record = {
        id: Date.now(),
        date,
        timeIn,
        timeOut,
        customOT: Number(inputCustomOT.value) || 0,
        specialTransport: Number(inputSpecialTransport.value) || 0
    };

    records.push(record);
    localStorage.setItem('timeRecords_2026', JSON.stringify(records));

    render();

    // 🔥 auto sync
    setTimeout(() => sendRecordsToSheet(), 300);
}

// =========================
// 📤 SEND SHEET
// =========================
async function sendRecordsToSheet() {
    await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ records })
    });
}

// =========================
// 📊 SUMMARY
// =========================
function calculateMonthly() {

    let otOnly = 0;
    let transport = 0;
    let total = 0;

    records.forEach(r => {
        const ot = calculateOT(r);
        otOnly += ot.otOnly;
        transport += ot.transport;
        total += ot.total;
    });

    const salary = CONFIG.SALARY + CONFIG.ALLOWANCE;

    return {
        otOnly,
        transport,
        total,
        income: salary + total
    };
}

// =========================
// 🎨 RENDER
// =========================
function render() {

    const m = calculateMonthly();

    summaryContainer.innerHTML = `
        <div>OT ล้วน: ฿${m.otOnly}</div>
        <div>ค่าเดินทาง: ฿${m.transport}</div>
        <div>รวม OT: ฿${m.total}</div>
        <div>เงินรวม: ฿${m.income}</div>
    `;
}

// =========================
// 🚀 START
// =========================
loadFromSheet();

</script>
