<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracking 2026</title>

<style>
body {
    font-family: sans-serif;
    background: linear-gradient(135deg,#fed7aa,#fce7f3,#dbeafe);
    margin:0;
    padding:10px;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:10px;
}
.header h1{
    background: linear-gradient(135deg,#ea580c,#9333ea,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* STATUS */
.status-box{
    background:#dcfce7;
    border:2px solid #22c55e;
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-bottom:10px;
}

/* CARD */
.card{
    background:#fff7ed;
    border:2px solid #fed7aa;
    border-radius:14px;
    padding:12px;
    margin-bottom:10px;
}

/* RECORD */
.record{
    background:#fffef2;
    border-left:6px solid #facc15;
    border:2px solid #fde68a;
    border-radius:10px;
    padding:10px;
    margin-bottom:8px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
}

/* ITEM */
.item{
    background:#fef9c3;
    padding:6px;
    border-radius:6px;
    font-size:12px;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-top:6px;
    font-weight:bold;
}

.btn-add{ background:#ea580c;color:#fff; }
.btn-save{ background:#22c55e;color:#fff; }
.btn-del{ background:#ef4444;color:#fff; }

/* SUMMARY */
.summary{
    background:linear-gradient(135deg,#dbeafe,#f3e8ff);
    border:2px solid #9333ea;
    border-radius:14px;
    padding:12px;
    margin-top:10px;
}

.box{
    background:#fff;
    padding:8px;
    border-radius:8px;
    margin-bottom:6px;
}

.value{
    font-weight:bold;
    color:#ea580c;
}
</style>
</head>

<body>

<div class="header">
    <h1>⏱️ Time Tracking 2026</h1>
</div>

<div class="status-box">✅ Sync Google Sheet</div>

<div class="card">
    <input type="date" id="date">
    <input type="time" id="in" value="09:00">
    <input type="time" id="out" value="18:00">
    <input type="number" id="ot" placeholder="OT เพิ่ม">
    <button class="btn-add" onclick="add()">➕ เพิ่ม</button>
    <button class="btn-save" onclick="sync()">⬆️ Sync</button>
</div>

<div id="list"></div>
<div id="sum"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxq2Rd3oPL7UEW8Pe4b1sS0zSxvm8b_vcnZ32-MyaZN2kt8D01Q4qajzjLkXvjB2Tgc/exec";

let data = JSON.parse(localStorage.getItem("rec")||"[]");

/* ADD */
function add(){
    let r={
        id:Date.now(),
        date:date.value,
        in:in.value,
        out:out.value,
        ot:Number(ot.value)||0
    };
    data.push(r);
    save();
}

/* SAVE */
function save(){
    localStorage.setItem("rec",JSON.stringify(data));
    render();
}

/* DELETE */
function del(id){
    data=data.filter(x=>x.id!=id);
    save();
}

/* CALC */
function calc(r){
    let h1=Number(r.in.split(":")[0]);
    let h2=Number(r.out.split(":")[0]);

    let ot = Math.max(0,h2-18)*100;
    return ot + r.ot;
}

/* RENDER */
function render(){
    list.innerHTML="";
    let total=0;

    data.forEach(r=>{
        let money=calc(r);
        total+=money;

        list.innerHTML+=`
        <div class="record">
            ${r.date}
            <div class="grid">
                <div class="item">เข้า ${r.in}</div>
                <div class="item">ออก ${r.out}</div>
                <div class="item">OT ${money}</div>
            </div>
            <button class="btn-del" onclick="del(${r.id})">ลบ</button>
        </div>
        `;
    });

    sum.innerHTML=`
    <div class="summary">
        <div class="box">เงินเดือน <span class="value">19000</span></div>
        <div class="box">รวม OT <span class="value">${total}</span></div>
        <div class="box">รวมทั้งหมด <span class="value">${19000+total}</span></div>
    </div>
    `;
}

/* SYNC */
async function sync(){
    await fetch(API,{
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify({action:"append",records:data})
    });
    alert("ส่งแล้ว");
}

render();
</script>

</body>
</html>
