<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการข้อมูล - Professional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sarabun:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2d6a4f;
      --primary-hover: #1b4332;
      --bg: #f4f7f6;
      --card: #ffffff;
      --text: #2d3436;
      --danger: #d63031;
    }

    body {
      font-family: 'Inter', 'Sarabun', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--card);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h2 { color: var(--primary); margin-bottom: 25px; text-align: center; }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-submit { background: var(--primary); color: white; }
    .btn-submit:hover { background: var(--primary-hover); }
    .btn-submit:disabled { background: #ccc; }

    .data-table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .data-table th { background: #f9f9f9; color: var(--primary); }

    .loading { text-align: center; color: #666; font-style: italic; }
    .delete-btn { color: var(--danger); cursor: pointer; border: none; background: none; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>บันทึกข้อมูลการทำงาน 👷‍♂️</h2>
  
  <div id="form">
    <div class="form-group">
      <label>วันที่</label>
      <input type="date" id="date">
    </div>
    <div style="display: flex; gap: 10px;">
      <div class="form-group" style="flex: 1;">
        <label>เวลาเข้า</label>
        <input type="time" id="timeIn">
      </div>
      <div class="form-group" style="flex: 1;">
        <label>เวลาออก</label>
        <input type="time" id="timeOut">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-submit" id="saveBtn" onclick="saveData()">บันทึกข้อมูล</button>
    </div>
  </div>

  <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

  <h3>ประวัติการบันทึก</h3>
  <div id="status" class="loading">กำลังโหลดข้อมูล...</div>
  <table class="data-table" id="dataTable">
    <thead>
      <tr>
        <th>วันที่</th>
        <th>เข้า-ออก</th>
        <th>จัดการ</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbycFdDdEC6i3-P71v5ZiPSA_SkSK_nxarPaZ_xziihsN6Q2pMiaCKDsg4bvkGuDeg6g/exec"; // **อย่าลืมเปลี่ยน ID**

  // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
  window.onload = loadData;

  async function loadData() {
    try {
      const resp = await fetch(API_URL);
      const data = await resp.json();
      renderTable(data);
      document.getElementById('status').style.display = 'none';
    } catch (err) {
      document.getElementById('status').innerText = "โหลดข้อมูลไม่สำเร็จ";
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = "";
    data.reverse().forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${row.date || '-'}</td>
        <td>${row.timeIn} - ${row.timeOut}</td>
        <td><button class="delete-btn" onclick="deleteRow('${row.id}')">ลบ</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function saveData() {
    const btn = document.getElementById('saveBtn');
    const record = {
      date: document.getElementById('date').value,
      timeIn: document.getElementById('timeIn').value,
      timeOut: document.getElementById('timeOut').value,
      customOT: 0,
      specialTransport: 0
    };

    if(!record.date || !record.timeIn) return alert("กรุณากรอกข้อมูลให้ครบ");

    btn.disabled = true;
    btn.innerText = "กำลังบันทึก...";

    try {
      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: 'append', records: [record] })
      });
      alert("บันทึกสำเร็จ!");
      location.reload();
    } catch (err) {
      alert("เกิดข้อผิดพลาด");
      btn.disabled = false;
      btn.innerText = "บันทึกข้อมูล";
    }
  }

  async function deleteRow(id) {
    if(!confirm("ยืนยันการลบ?")) return;
    try {
      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: 'deleteById', id: id })
      });
      location.reload();
    } catch (err) {
      alert("ลบไม่สำเร็จ");
    }
  }
</script>

</body>
</html>
