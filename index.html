<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracking PRO+</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#fed7aa,#fce7f3,#dbeafe);
}

.container{padding:16px}

h1{
text-align:center;
background:linear-gradient(90deg,#ea580c,#9333ea,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.status{
background:#dcfce7;
border:2px solid #22c55e;
padding:10px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:12px;
border:2px solid #fed7aa;
}

input{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:2px solid #fed7aa;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
}

.add{background:#f97316;color:white;}
.sync{background:#22c55e;color:white;margin-top:6px;}

.record{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:8px;
border-left:5px solid #f59e0b;
}

.summary{
background:linear-gradient(135deg,#dbeafe,#f3e8ff);
border:2px solid #9333ea;
padding:12px;
border-radius:12px;
}

.box{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.big{font-size:20px;font-weight:bold;color:#ea580c}
</style>
</head>

<body>

<div class="container">

<h1>⏱️ Time Tracking PRO+</h1>

<div class="status">✅ เวอร์เทพ พร้อมใช้</div>

<div class="card">
<input type="date" id="date">
<input type="time" id="in" value="09:00">
<input type="time" id="out" value="18:00">
<input type="number" id="custom" placeholder="Custom OT">
<input type="number" id="extra" placeholder="ค่าเดินทาง">

<button class="add" onclick="add()">+ เพิ่ม</button>
<button class="sync" onclick="sync()">⬆ Sync Sheet</button>
</div>

<div id="list"></div>
<div id="sum"></div>

</div>

<script>

const WEB_APP_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnSSViGx2eyVhpJ8P1NIR2klblIWlknHTRdp6k5G8ZIT89L0mszGLEPp56tjB_85ky88aw9HCJYdpDszJzhr_JqE4E5BYI-l62cyjXkeZtUbte3zANm34QjP9of0yyiV9GUX7SMikhO8RuiG2kjHNCiJS3bAFQV7YJP8ImkPj2Rj5aatMXSPeTlEd5zVxi6p2Or-xv4HoUHqbASeZ8yp2PjnoEJzm-gzSDiv2OBM_S2tTyUgpLkfQMHbsLXUsqPb9BXlY_WihbbFwsa4EkRAdYk9GMRZ-g&lib=MwBYzrbIWzcA96h9sUegyF9szXJcOglkN";

let records = JSON.parse(localStorage.getItem("rec")) || [];

function t(time){
let [h,m]=time.split(":").map(Number);
return h+m/60;
}

function calc(r){
let inT=t(r.in);
let outT=t(r.out);
if(outT<inT) outT+=24;

let ot100=0,ot150=0,ot200=0;

ot100=Math.max(0,Math.min(outT,23)-Math.max(inT,18));

if(inT<9) ot150+=9-inT;
if(outT>23) ot150+=outT-23;

let total=ot100*100+ot150*150+ot200*200;
total+=r.custom+r.extra;

return {total,ot100,ot150,ot200};
}

function add(){
const r={
date:date.value,
in:in.value,
out:out.value,
custom:+custom.value||0,
extra:+extra.value||0
};
records.push(r);
save();
}

function save(){
localStorage.setItem("rec",JSON.stringify(records));
render();
}

function render(){
try{
let html="";
let total=0;

records.forEach(r=>{
let c=calc(r);
total+=c.total;

html+=`
<div class="record">
${r.date} | ${r.in}-${r.out}<br>
OT100:${c.ot100.toFixed(2)} | OT150:${c.ot150.toFixed(2)}<br>
รวม: ${c.total}
</div>`;
});

list.innerHTML=html||"ไม่มีข้อมูล";

sum.innerHTML=`
<div class="summary">
<div class="box">เงินเดือน<div class="big">19000</div></div>
<div class="box">รวม OT<div class="big">${total}</div></div>
<div class="box">รวมทั้งหมด<div class="big">${19000+total}</div></div>
</div>`;

}catch(e){
document.body.innerHTML="ERROR: "+e.message;
}
}

async function sync(){
try{
await fetch(WEB_APP_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({records})
});
alert("ส่งแล้ว");
}catch{
alert("ส่งไม่สำเร็จ");
}
}

render();
</script>

</body>
</html>
