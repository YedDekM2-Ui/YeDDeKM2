<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱️ Time Tracking PRO MAX</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Noto Sans Thai';background:linear-gradient(135deg,#fed7aa,#fce7f3,#dbeafe);}
.container{max-width:500px;margin:auto;padding:16px;}
.header{text-align:center;margin-bottom:10px;}
.header h1{
background:linear-gradient(135deg,#ea580c,#9333ea,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;}
input{width:100%;padding:10px;margin:6px 0;border:2px solid #fed7aa;border-radius:8px;}

button{width:100%;padding:12px;border:none;border-radius:10px;background:#ea580c;color:#fff;font-weight:700;margin-top:5px;}

.record{background:#fff;padding:10px;border-radius:10px;margin-top:8px;border-left:6px solid #ccc;}
.ot100{border-left-color:#3b82f6;}
.ot150{border-left-color:#f59e0b;}
.ot200{border-left-color:#ef4444;}

.summary{background:#f3e8ff;padding:10px;border-radius:10px;margin-top:8px;font-weight:700;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>⏱️ Time Tracking PRO MAX</h1>
</div>

<div class="card">
<input type="date" id="date">
<input type="time" id="in" value="09:00">
<input type="time" id="out" value="18:00">
<input type="number" id="custom" placeholder="OT พิเศษ">
<input type="number" id="extra" placeholder="ค่าเดินทางพิเศษ">
<button onclick="save()">💾 บันทึก</button>
<button onclick="printSlip()">🖨️ ออกสลิป</button>
</div>

<canvas id="chart"></canvas>
<div id="list"></div>

</div>

<script>

const HOLIDAY_API = "https://docs.google.com/spreadsheets/d/1-siPR8NwN3wqatR3y6w8IJ-PtepFJnTzDFtjDsrJ8sg/gviz/tq?tqx=out:csv&sheet=Holidays";

let holidays=[];

// โหลดวันหยุด
async function loadHoliday(){
  try{
    let res=await fetch(HOLIDAY_API);
    let txt=await res.text();
    holidays=txt.split("\n").map(d=>d.trim());
  }catch(e){}
}

// แปลงเวลา
function t(v){let[h,m]=v.split(":").map(Number);return h+m/60;}

// รอบเดือน 26-25
function getPeriod(d){
  let x=new Date(d);
  let y=x.getFullYear();
  let m=x.getMonth();
  if(x.getDate()<26){m--;if(m<0){m=11;y--;}}
  return `${y}-${m+1}`;
}

// คำนวณ
function calc(r){

  let inT=t(r.in);
  let outT=t(r.out);
  if(outT<inT) outT+=24;

  let isHoliday=holidays.includes(r.date);
  let day=new Date(r.date).getDay();
  let isWed=(day===3);

  let ot100=0,ot150=0,ot200=0,transport=0;

  if(!isHoliday && !isWed){
    ot100=Math.max(0,Math.min(outT,23)-Math.max(inT,18));
    if(inT<9) ot150+=9-inT;
    if(outT>23) ot150+=outT-23;
  }else{
    ot150=Math.max(0,outT-inT);
  }

  if(outT>=23) transport=200;

  let total=
    ot100*100 +
    ot150*150 +
    ot200*200 +
    transport +
    (r.custom||0) +
    (r.extra||0);

  return {total,transport,otOnly:total-transport};
}

// save
function save(){

  let r={
    date:date.value,
    in:in.value,
    out:out.value,
    custom:+custom.value||0,
    extra:+extra.value||0
  };

  let data=JSON.parse(localStorage.getItem("data"))||[];
  data.push(r);
  localStorage.setItem("data",JSON.stringify(data));

  render();
}

// render
function render(){

  let data=JSON.parse(localStorage.getItem("data"))||[];
  let groups={};

  data.forEach(d=>{
    let p=getPeriod(d.date);
    if(!groups[p]) groups[p]=[];
    groups[p].push(d);
  });

  let html="";

  Object.keys(groups).sort().reverse().forEach(p=>{

    let total=0,transport=0,ot=0;

    groups[p].forEach(d=>{
      let c=calc(d);
      total+=c.total;
      transport+=c.transport;
      ot+=c.otOnly;
    });

    html+=`<div class="card">
    <div class="summary">📊 รอบ ${p} รวม ${total} บาท</div>`;

    groups[p].forEach(d=>{
      let c=calc(d);
      html+=`
      <div class="record">
      📅 ${d.date}<br>
      ⏰ ${d.in}-${d.out}<br>
      💰 ${c.total} บาท
      </div>`;
    });

    html+=`</div>`;
  });

  document.getElementById("list").innerHTML=html||"ไม่มีข้อมูล";

  drawChart();
}

// กราฟ
function drawChart(){

  let data=JSON.parse(localStorage.getItem("data"))||[];
  let g={};

  data.forEach(d=>{
    let p=getPeriod(d.date);
    if(!g[p]) g[p]=0;
    g[p]+=calc(d).total;
  });

  let ctx=document.getElementById("chart");

  new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(g),
      datasets:[{label:"รายได้",data:Object.values(g)}]
    }
  });
}

// สลิป
function printSlip(){

  let data=JSON.parse(localStorage.getItem("data"))||[];
  if(data.length===0) return alert("ไม่มีข้อมูล");

  let p=getPeriod(data[data.length-1].date);
  let list=data.filter(d=>getPeriod(d.date)===p);

  let total=0,transport=0;

  list.forEach(d=>{
    let c=calc(d);
    total+=c.total;
    transport+=c.transport;
  });

  let salary=19000;
  let social=850;

  let html=`
  <html><body style="font-family:sans-serif;padding:20px">
  <h2>สลิปเงินเดือน</h2>
  <p>รอบ ${p}</p>
  เงินเดือน ${salary}<br>
  OT ${total-transport}<br>
  ค่าเดินทาง ${transport}<br>
  <hr>
  รวม ${salary+total}<br>
  หัก ${social}<br>
  <b>สุทธิ ${(salary+total-social)}</b>
  </body></html>`;

  let w=window.open();
  w.document.write(html);
  w.print();
}

// start
date.value=new Date().toISOString().split("T")[0];
loadHoliday().then(render);

</script>

</body>
</html>
