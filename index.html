<script>

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxq2Rd3oPL7UEW8Pe4b1sS0zSxvm8b_vcnZ32-MyaZN2kt8D01Q4qajzjLkXvjB2Tgc/exec';

const CONFIG = {
    SALARY: 17000,
    ALLOWANCE: 2000,
    SOCIAL_SEC: 850,
    FIRST_PAYMENT: 16150,
    TRANSPORT: 200,
    OT100_RATE: 100,
    OT150_RATE: 150,
    OT200_RATE: 200,
    OT100_START: 18
};

let records = [];

// =========================
// 📥 LOAD FROM SHEET
// =========================
async function loadFromSheet() {
    try {
        const res = await fetch(WEB_APP_URL);

        if (!res.ok) throw new Error("API ERROR");

        const data = await res.json();

        if (!Array.isArray(data)) throw new Error("DATA ไม่ใช่ ARRAY");

        records = data.map(r => ({
            id: Date.now() + Math.random(),
            date: formatDate(r.date),
            timeIn: formatTime(r.timeIn),
            timeOut: formatTime(r.timeOut),
            customOT: Number(r.customOT) || 0,
            specialTransport: Number(r.specialTransport) || 0
        }));

        localStorage.setItem('timeRecords_2026', JSON.stringify(records));

    } catch (err) {
        console.log("🔥 fallback local:", err);
        records = JSON.parse(localStorage.getItem('timeRecords_2026')) || [];
    }

    render();
}

// =========================
// 🔧 FORMAT DATE
// =========================
function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toISOString().split('T')[0];
}

// =========================
// 🔧 FORMAT TIME (กันพัง)
// =========================
function formatTime(timeStr) {
    if (!timeStr) return '00:00';

    if (timeStr.includes('T')) {
        const d = new Date(timeStr);
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    return timeStr;
}

// =========================
// ⏱ TIME → DECIMAL
// =========================
function timeToDecimal(timeStr) {
    if (!timeStr) return 0;

    const [h, m] = timeStr.split(':').map(Number);
    return h + m / 60;
}

// =========================
// 📅 DAY TYPE
// =========================
function getDayType(dateStr) {
    const d = new Date(dateStr);
    if (d.getDay() === 3) return 'พุธ';
    return 'ปกติ';
}

// =========================
// 💰 OT CALC
// =========================
function calculateOT(record) {

    const timeIn = timeToDecimal(record.timeIn);
    let timeOut = timeToDecimal(record.timeOut);

    if (timeOut < timeIn) timeOut += 24;

    let ot100 = 0, ot150 = 0, transport = 0;

    if (getDayType(record.date) === 'ปกติ') {

        ot100 = Math.max(0, Math.min(timeOut, 23) - Math.max(timeIn, 18));

        if (timeIn < 9) ot150 += (9 - timeIn);
        if (timeOut > 23) ot150 += (timeOut - 23);

    } else {
        ot150 = Math.max(0, Math.min(timeOut, 23) - Math.max(timeIn, 9));
    }

    if (timeOut >= 23) transport = CONFIG.TRANSPORT;

    const otTotal =
        ot100 * CONFIG.OT100_RATE +
        ot150 * CONFIG.OT150_RATE +
        (record.customOT || 0);

    return {
        total: otTotal + transport + (record.specialTransport || 0),
        otOnly: otTotal,
        transport: transport + (record.specialTransport || 0)
    };
}

// =========================
// ➕ ADD RECORD
// =========================
function addRecord() {

    const record = {
        id: Date.now(),
        date: document.getElementById('inputDate').value,
        timeIn: document.getElementById('inputTimeIn').value,
        timeOut: document.getElementById('inputTimeOut').value,
        customOT: Number(document.getElementById('inputCustomOT').value) || 0,
        specialTransport: Number(document.getElementById('inputSpecialTransport').value) || 0
    };

    records.push(record);

    localStorage.setItem('timeRecords_2026', JSON.stringify(records));

    render();

    // 🔥 ส่งเฉพาะรายการเดียว
    sendRecordsToSheet(record);
}

// =========================
// 📤 SEND SHEET
// =========================
async function sendRecordsToSheet(record) {
    try {
        await fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'append',
                records: [record]
            })
        });
    } catch (err) {
        console.log("ส่งไม่สำเร็จ", err);
    }
}

// =========================
// 📊 SUMMARY
// =========================
function calculateMonthly() {

    let otOnly = 0, transport = 0, total = 0;

    records.forEach(r => {
        const ot = calculateOT(r);
        otOnly += ot.otOnly;
        transport += ot.transport;
        total += ot.total;
    });

    const salary = CONFIG.SALARY + CONFIG.ALLOWANCE;

    return {
        otOnly,
        transport,
        total,
        income: salary + total
    };
}

// =========================
// 🎨 RENDER (กันพัง)
// =========================
function render() {

    const el = document.getElementById('summaryContainer');

    if (!el) {
        console.log("❌ ไม่มี summaryContainer");
        return;
    }

    const m = calculateMonthly();

    el.innerHTML = `
        <div>OT ล้วน: ฿${m.otOnly}</div>
        <div>ค่าเดินทาง: ฿${m.transport}</div>
        <div>รวม OT: ฿${m.total}</div>
        <div>เงินรวม: ฿${m.income}</div>
    `;
}

// =========================
// 🚀 START
// =========================
loadFromSheet();

</script>
