<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log System</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-green: #1b4332; /* เขียวเข้มโปร */
      --accent-green: #2d6a4f;
      --bg-color: #f0f2f5;
      --white: #ffffff;
    }
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: var(--white);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h2 { color: var(--primary-green); text-align: center; margin-bottom: 25px; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #444; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: var(--accent-green); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-green);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-submit:hover { background-color: var(--accent-green); }
    .btn-submit:disabled { background-color: #999; }

    .list-area { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
    .item {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid var(--accent-green);
    }
    .delete-btn { color: #dc3545; cursor: pointer; font-weight: bold; padding: 5px 10px; }
  </style>
</head>
<body>

<div class="container">
  <h2>ระบบบันทึกเวลาทำงาน 📋</h2>
  
  <div class="form-group">
    <label>วันที่</label>
    <input type="date" id="date">
  </div>
  <div style="display: flex; gap: 10px;">
    <div class="form-group" style="flex: 1;">
      <label>เข้างาน</label>
      <input type="time" id="timeIn">
    </div>
    <div class="form-group" style="flex: 1;">
      <label>เลิกงาน</label>
      <input type="time" id="timeOut">
    </div>
  </div>
  
  <button class="btn-submit" id="saveBtn" onclick="sendData()">บันทึกข้อมูล</button>

  <div class="list-area" id="listArea">
    <p style="text-align: center; color: #666;">กำลังโหลดข้อมูล...</p>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxF1EVrlCu5XrC9z0tnR3wc7EJbTQl8pAK04A4A-BcJJ_WzUCtF2zZ5PvYgYNPJsfdh/exec"; // วาง URL ที่ได้จาก Deployment ตรงนี้

  window.onload = loadData;

  async function loadData() {
    try {
      const response = await fetch(WEB_APP_URL);
      const data = await response.json();
      renderList(data);
    } catch (err) {
      document.getElementById('listArea').innerHTML = "โหลดข้อมูลไม่สำเร็จ";
    }
  }

  function renderList(data) {
    const area = document.getElementById('listArea');
    if (data.length === 0) {
      area.innerHTML = "<p style='text-align:center'>ยังไม่มีข้อมูล</p>";
      return;
    }
    area.innerHTML = "<h3>รายการล่าสุด</h3>";
    data.reverse().slice(0, 10).forEach(item => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <strong>${item.date}</strong><br>
          <small>${item.timeIn} - ${item.timeOut}</small>
        </div>
        <div class="delete-btn" onclick="deleteData('${item.id}')">ลบ</div>
      `;
      area.appendChild(div);
    });
  }

  async function sendData() {
    const btn = document.getElementById('saveBtn');
    const records = [{
      date: document.getElementById('date').value,
      timeIn: document.getElementById('timeIn').value,
      timeOut: document.getElementById('timeOut').value,
      customOT: 0,
      specialTransport: 0
    }];

    if(!records[0].date || !records[0].timeIn) return alert("กรุณากรอกข้อมูล");

    btn.disabled = true;
    btn.innerText = "กำลังบันทึก...";

    try {
      await fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: 'append', records: records })
      });
      alert("สำเร็จ!");
      location.reload();
    } catch (err) {
      alert("เกิดข้อผิดพลาด");
      btn.disabled = false;
      btn.innerText = "บันทึกข้อมูล";
    }
  }

  async function deleteData(id) {
    if(!confirm("ลบรายการนี้ใช่ไหม?")) return;
    await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: 'deleteById', id: id })
    });
    location.reload();
  }
</script>
</body>
</html>
