<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracking 2026</title>

<style>
body{
    font-family:sans-serif;
    background: linear-gradient(135deg,#fed7aa,#fce7f3,#dbeafe);
    margin:0;
    padding:10px;
}

.header{text-align:center;margin-bottom:10px;}
.header h1{
    background: linear-gradient(135deg,#ea580c,#9333ea,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card{
    background:#fff7ed;
    border:2px solid #fed7aa;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
}

.record{
    background:#fffef2;
    border-left:5px solid #facc15;
    border:2px solid #fde68a;
    border-radius:10px;
    padding:10px;
    margin-bottom:8px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
}

.item{
    background:#fef3c7;
    padding:6px;
    border-radius:6px;
    font-size:12px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-top:6px;
    font-weight:bold;
}

.add{background:#ea580c;color:#fff;}
.del{background:#ef4444;color:#fff;}

.summary{
    background:linear-gradient(135deg,#dbeafe,#f3e8ff);
    border:2px solid #9333ea;
    border-radius:12px;
    padding:10px;
}

.box{
    background:#fff7ed;
    padding:6px;
    border-radius:6px;
    margin-bottom:6px;
}

.val{color:#ea580c;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
    <h1>⏱️ Time Tracking</h1>
</div>

<div class="card">
    <input id="date" type="date">
    <input id="in" type="time" value="09:00">
    <input id="out" type="time" value="18:00">
    <input id="extra" type="number" placeholder="OT เพิ่ม">
    <button class="add" onclick="add()">เพิ่ม</button>
</div>

<div id="list"></div>
<div id="sum"></div>

<script>
let data = JSON.parse(localStorage.getItem("rec")||"[]");

/* กันพังแน่นอน */
window.onload = function(){

    document.getElementById("date").value =
        new Date().toISOString().split('T')[0];

    render();
}

/* ADD */
function add(){
    let d=document.getElementById("date").value;
    let i=document.getElementById("in").value;
    let o=document.getElementById("out").value;
    let e=Number(document.getElementById("extra").value)||0;

    if(!d||!i||!o) return alert("ใส่เวลา");

    data.push({
        id:Date.now(),
        date:d,
        in:i,
        out:o,
        extra:e
    });

    localStorage.setItem("rec",JSON.stringify(data));
    render();
}

/* DELETE */
function del(id){
    data=data.filter(x=>x.id!=id);
    localStorage.setItem("rec",JSON.stringify(data));
    render();
}

/* CALC */
function calc(r){
    let h1=parseInt(r.in);
    let h2=parseInt(r.out);

    if(h2<h1) h2+=24;

    let ot = Math.max(0,h2-18)*100;
    return ot + r.extra;
}

/* RENDER */
function render(){
    let list=document.getElementById("list");
    let sum=document.getElementById("sum");

    if(!list||!sum) return;

    list.innerHTML="";
    let total=0;

    data.forEach(r=>{
        let money=calc(r);
        total+=money;

        list.innerHTML+=`
        <div class="record">
            ${r.date}
            <div class="grid">
                <div class="item">เข้า ${r.in}</div>
                <div class="item">ออก ${r.out}</div>
                <div class="item">OT ${money}</div>
            </div>
            <button class="del" onclick="del(${r.id})">ลบ</button>
        </div>
        `;
    });

    sum.innerHTML=`
    <div class="summary">
        <div class="box">เงินเดือน <span class="val">19000</span></div>
        <div class="box">รวม OT <span class="val">${total}</span></div>
        <div class="box">รวมทั้งหมด <span class="val">${19000+total}</span></div>
    </div>
    `;
}
</script>

</body>
</html>
