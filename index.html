<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TimeTrack Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════ */
:root {
  --t50:  #F0FAFA; --t100: #D5F2EF; --t200: #A8E4DE;
  --t300: #7AD5CC; --t400: #4DC6BB; --t500: #2AADA1;
  --t600: #1E8F84; --t700: #146F67;
  --rose: #FFE4EC; --roseDk: #F472A8;
  --amber: #FFF3DC; --amberDk: #F5A623;
  --lavender: #EEE9FF; --lavDk: #8B6FD8;
  --sky: #E5F3FF; --skyDk: #3B8ED6;
  --mint: #E5F9F5; --sage: #D4EDE8;
  --bg: #F2FAFA; --card: #FFFFFF;
  --n50: #F7F9F9; --n100: #ECF0F0; --n200: #D3DCDB;
  --n300: #A8BCBA; --n400: #7A9997; --n600: #3D6361; --n800: #1C3A38;
  --success-bg: #E6F9F3; --success: #1A8C62;
  --warn-bg: #FFF8E6; --warn: #C07A00;
  --err-bg: #FFF0F0; --err: #C0392B;
  --r-xs: 6px; --r-sm: 10px; --r: 14px; --r-lg: 20px; --r-xl: 28px;
  --shadow-xs: 0 1px 4px rgba(42,173,161,.08);
  --shadow-sm: 0 2px 10px rgba(42,173,161,.10);
  --shadow: 0 4px 20px rgba(42,173,161,.13);
  --font: 'Noto Sans Thai', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--n800); min-height:100dvh; overflow-x:hidden; }

/* ── LAYOUT ── */
#app { max-width:480px; margin:0 auto; padding-bottom:90px; }

/* ── TOPBAR ── */
#topbar {
  position:sticky; top:0; z-index:200;
  background:rgba(240,250,250,.95);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--t100);
  padding:12px 16px 10px;
  display:flex; align-items:center; justify-content:space-between;
}
.tb-left h1 { font-size:18px; font-weight:700; color:var(--t600); letter-spacing:-.3px; }
.tb-left .tb-sub { font-size:11px; color:var(--n400); margin-top:2px; display:flex; align-items:center; gap:5px; }
.live-dot { width:6px; height:6px; border-radius:50%; background:#34D399; animation:livepulse 2s ease-in-out infinite; }
@keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

.btn-sync {
  background:var(--t400); color:#fff; border:none; border-radius:20px;
  padding:6px 14px; font-size:12px; font-weight:600; font-family:var(--font);
  cursor:pointer; display:flex; align-items:center; gap:4px; transition:all .2s; white-space:nowrap;
}
.btn-sync:active { transform:scale(.95); }
.btn-sync.busy { opacity:.6; pointer-events:none; }
.spin { animation:rot 1s linear infinite; display:inline-block; }
@keyframes rot { to{transform:rotate(360deg)} }

/* ── TABS ── */
#tabBar {
  display:flex; background:var(--card); border-bottom:1px solid var(--t100);
  padding:0 4px; position:sticky; top:58px; z-index:190;
  overflow-x:auto; scrollbar-width:none;
}
#tabBar::-webkit-scrollbar { display:none; }
.tab-btn {
  flex:0 0 auto; padding:11px 14px 9px; font-size:12.5px; font-weight:500;
  color:var(--n400); border:none; background:none; border-bottom:2.5px solid transparent;
  cursor:pointer; font-family:var(--font); white-space:nowrap; transition:all .2s; user-select:none;
}
.tab-btn.on { color:var(--t500); border-bottom-color:var(--t400); }

/* ── PAGES ── */
.page { display:none; padding:14px 14px 0; animation:fadeIn .22s ease; }
.page.on { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

/* ── CARD ── */
.card {
  background:var(--card); border:1px solid var(--t100); border-radius:var(--r);
  padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow-xs);
}
.card-head {
  font-size:10.5px; font-weight:700; letter-spacing:.6px;
  text-transform:uppercase; color:var(--n400); margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.card-head .badge {
  font-size:9px; padding:2px 7px; border-radius:10px;
  background:var(--t100); color:var(--t600); font-weight:600;
}

/* ── FORM ── */
.fg { display:flex; flex-direction:column; gap:4px; }
.fg label { font-size:11px; font-weight:600; color:var(--n400); }
.fg input {
  background:var(--t50); border:1.5px solid var(--t100); border-radius:var(--r-sm);
  padding:10px 12px; font-size:14px; font-weight:500; color:var(--n800);
  font-family:var(--font); transition:all .18s; width:100%; -webkit-appearance:none;
}
.fg input:focus { outline:none; border-color:var(--t400); background:#fff; box-shadow:0 0 0 3px rgba(77,198,187,.15); }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.row1 { margin-bottom:10px; }

/* ── PREVIEW ── */
#previewBox {
  background:linear-gradient(135deg, var(--mint), #fff);
  border:1.5px solid var(--t200); border-radius:var(--r-sm);
  padding:12px 14px; margin:10px 0; display:none;
  animation:fadeIn .2s ease;
}
.pv-row { display:flex; justify-content:space-between; font-size:13px; }
.pv-type { font-weight:700; }
.pv-type.normal { color:var(--t500); }
.pv-type.wednesday { color:var(--amberDk); }
.pv-type.holiday { color:var(--roseDk); }
.pv-nums { display:flex; gap:10px; }
.pv-ot { color:var(--t500); font-weight:600; }
.pv-total { color:var(--n800); font-weight:800; }
.pv-detail { font-size:11px; color:var(--n400); margin-top:5px; display:flex; gap:8px; flex-wrap:wrap; }

/* ── EDIT MODE BANNER ── */
#editBanner {
  display:none; background:linear-gradient(135deg,#EFF6FF,#DBEAFE);
  border:1.5px solid #93C5FD; border-radius:var(--r-sm);
  padding:10px 14px; margin-bottom:10px;
  font-size:12px; color:#1D4ED8; font-weight:600;
  align-items:center; justify-content:space-between; gap:8px;
}
#editBanner.show { display:flex; }
.btn-cancel-edit {
  background:none; border:1.5px solid #93C5FD; color:#1D4ED8;
  font-size:11px; padding:3px 10px; border-radius:20px;
  cursor:pointer; font-family:var(--font); white-space:nowrap;
}

/* ── SAVE BUTTON ── */
.btn-main {
  width:100%; padding:13px;
  background:linear-gradient(135deg, var(--t400), var(--t600));
  border:none; border-radius:var(--r-sm); color:#fff;
  font-size:15px; font-weight:700; font-family:var(--font);
  cursor:pointer; transition:all .2s; letter-spacing:.1px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 14px rgba(42,173,161,.25);
}
.btn-main:active { transform:scale(.98); opacity:.9; }
.btn-main.loading { opacity:.6; pointer-events:none; }
.btn-main.edit-mode {
  background:linear-gradient(135deg, #3B82F6, #1D4ED8);
  box-shadow:0 4px 14px rgba(59,130,246,.25);
}

/* ── TOAST ── */
#toast {
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--n800); color:#fff; font-size:13px; font-weight:500;
  padding:9px 18px; border-radius:20px; z-index:999;
  opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap;
  max-width:calc(100vw - 40px); text-align:center;
}
#toast.ok { background:var(--success); }
#toast.err { background:var(--err); }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── RECORD CARDS ── */
.period-block { margin-bottom:20px; }
.period-hd { display:flex; align-items:center; justify-content:space-between; padding:6px 2px 8px; }
.period-name {
  font-size:13px; font-weight:700; color:var(--n600);
  display:flex; align-items:center; gap:8px;
}
.period-name::before {
  content:''; display:block; width:3px; height:16px;
  background:linear-gradient(to bottom, var(--t400), var(--t200)); border-radius:2px;
}
.period-sum {
  font-size:13px; font-weight:700; color:var(--t500);
  background:var(--t100); padding:3px 12px; border-radius:20px;
}

.rec {
  background:var(--card); border:1px solid var(--t100); border-radius:var(--r-sm);
  border-left:3.5px solid var(--t400); padding:11px 13px 42px;
  margin-bottom:8px; position:relative; transition:box-shadow .2s;
}
.rec:hover { box-shadow:var(--shadow-sm); }
.rec.wednesday { border-left-color:var(--amberDk); background:#FFFDF5; }
.rec.holiday { border-left-color:var(--roseDk); background:#FFF8FC; }

.rec-top { display:flex; align-items:flex-start; justify-content:space-between; }
.rec-left .rec-date { font-size:14px; font-weight:700; color:var(--n800); }
.rec-left .rec-meta { font-size:11px; color:var(--n400); margin-top:2px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.type-pill {
  font-size:9.5px; font-weight:700; padding:1px 7px;
  border-radius:10px; letter-spacing:.3px;
}
.type-pill.normal { background:var(--t100); color:var(--t600); }
.type-pill.wednesday { background:var(--amber); color:#8A5F00; }
.type-pill.holiday { background:var(--rose); color:#9D1761; }
.src-pill {
  font-size:9px; font-weight:600; padding:1px 6px;
  border-radius:8px; background:var(--warn-bg); color:var(--warn);
}

.rec-right { text-align:right; }
.rec-total { font-size:16px; font-weight:800; color:var(--t600); }
.rec-ot-sub { font-size:10px; color:var(--n400); margin-top:1px; }

.rec-detail {
  display:grid; grid-template-columns:repeat(3,1fr); gap:6px;
  margin-top:10px; padding-top:10px; border-top:1px solid var(--t100);
}
.dc { background:var(--n50); border-radius:var(--r-xs); padding:5px 6px; text-align:center; }
.dc .dk { font-size:9.5px; color:var(--n400); margin-bottom:2px; }
.dc .dv { font-size:12px; font-weight:700; color:var(--n600); }

.rec-pills { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.pill {
  font-size:10px; font-weight:600; padding:3px 9px;
  border-radius:10px; display:flex; align-items:center; gap:3px;
}
.pill.tr { background:var(--sky); color:var(--skyDk); }
.pill.sp { background:var(--rose); color:var(--roseDk); }
.pill.ct { background:var(--lavender); color:var(--lavDk); }

/* ── RECORD ACTION BUTTONS ── */
.rec-actions {
  position:absolute; right:10px; bottom:10px;
  display:flex; gap:6px; align-items:center;
}
.btn-act {
  background:none; font-size:10.5px; padding:4px 10px;
  border-radius:var(--r-xs); cursor:pointer; font-family:var(--font);
  transition:all .15s; font-weight:600; border:1.5px solid;
}
.btn-act.edit { border-color:#93C5FD; color:#3B82F6; }
.btn-act.edit:hover { background:#EFF6FF; }
.btn-act.del { border-color:#FCA5A5; color:#EF4444; }
.btn-act.del:hover { background:#FEF2F2; }

/* ── DAILY ── */
.daily-list { display:flex; flex-direction:column; gap:8px; }
.daily-item {
  background:var(--card); border:1px solid var(--t100); border-radius:var(--r-sm);
  padding:12px 14px; display:flex; align-items:center; justify-content:space-between;
  transition:background .15s;
}
.daily-item .di-left { display:flex; flex-direction:column; gap:3px; }
.daily-item .di-date { font-size:14px; font-weight:700; color:var(--n800); }
.daily-item .di-sub { font-size:11px; color:var(--n400); display:flex; gap:6px; flex-wrap:wrap; }
.daily-item .di-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.daily-item .di-total { font-size:15px; font-weight:800; color:var(--t600); }
.daily-item .di-ot { font-size:10px; color:var(--n400); }

/* ── MONTHLY ── */
.sum-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.sum-tile {
  background:var(--card); border:1px solid var(--t100);
  border-radius:var(--r-sm); padding:13px 14px; box-shadow:var(--shadow-xs);
}
.sum-tile.full { grid-column:1/-1; }
.sum-tile.accent {
  background:linear-gradient(135deg, var(--t400) 0%, var(--t600) 100%);
  border-color:transparent;
}
.sum-tile .st-label { font-size:10.5px; font-weight:600; color:var(--n400); margin-bottom:4px; }
.sum-tile.accent .st-label { color:rgba(255,255,255,.75); }
.sum-tile .st-val { font-size:20px; font-weight:800; color:var(--n800); line-height:1; }
.sum-tile.accent .st-val { color:#fff; }
.sum-tile .st-val.xl { font-size:26px; }
.sum-tile .st-note { font-size:10px; color:var(--n300); margin-top:3px; }
.sec-title {
  font-size:10.5px; font-weight:700; letter-spacing:.6px;
  text-transform:uppercase; color:var(--n400); margin:16px 0 10px;
}

.pay-table { width:100%; border-collapse:collapse; }
.pay-table tr { border-bottom:1px solid var(--t100); }
.pay-table tr:last-child { border-bottom:none; }
.pay-table td { padding:8px 0; font-size:13px; }
.pay-table td:last-child { text-align:right; font-weight:700; }
.pay-table .plus { color:var(--success); }
.pay-table .minus { color:var(--err); }
.pay-table .hi td { background:var(--t50); padding:8px 10px; }
.pay-table .hi td:first-child { border-radius:var(--r-xs) 0 0 var(--r-xs); color:var(--t600); font-weight:700; }
.pay-table .hi td:last-child { border-radius:0 var(--r-xs) var(--r-xs) 0; color:var(--t600); font-size:15px; }

.ot-bars { display:flex; flex-direction:column; gap:9px; }
.ot-row { display:flex; align-items:center; gap:8px; }
.ot-lbl { font-size:11px; color:var(--n400); width:44px; flex-shrink:0; }
.ot-track { flex:1; height:7px; background:var(--t50); border-radius:4px; overflow:hidden; border:1px solid var(--t100); }
.ot-fill { height:100%; border-radius:4px; transition:width .6s cubic-bezier(.22,1,.36,1); }
.ot-fill.c100 { background:var(--t400); }
.ot-fill.c150 { background:var(--amberDk); }
.ot-fill.c200 { background:var(--roseDk); }
.ot-fill.ccustom { background:var(--lavDk); }
.ot-val { font-size:11px; font-weight:700; color:var(--n600); width:68px; text-align:right; flex-shrink:0; }

.dtype-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 0; border-bottom:1px solid var(--t100); font-size:13px;
}
.dtype-row:last-child { border-bottom:none; }
.dtype-left { display:flex; align-items:center; gap:8px; color:var(--n600); }
.dtype-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dtype-right { font-weight:700; color:var(--n800); }

.period-select { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.period-btn {
  padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600;
  border:1.5px solid var(--t200); background:var(--card); color:var(--n400);
  cursor:pointer; font-family:var(--font); transition:all .15s;
}
.period-btn.on { background:var(--t400); border-color:var(--t400); color:#fff; }

.holiday-chips { display:flex; flex-wrap:wrap; gap:5px; max-height:100px; overflow-y:auto; }
.hchip { font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:10px; background:var(--rose); color:#9D1761; }

/* ── STATES ── */
.loading-state { text-align:center; padding:40px 20px; color:var(--n300); }
.loading-dots { display:inline-flex; gap:5px; margin-bottom:12px; }
.ld { width:8px; height:8px; border-radius:50%; background:var(--t200); animation:ldbn 1.2s ease-in-out infinite; }
.ld:nth-child(2){animation-delay:.15s}.ld:nth-child(3){animation-delay:.3s}
@keyframes ldbn { 0%,80%,100%{transform:scale(.8);opacity:.5} 40%{transform:scale(1.2);opacity:1} }
.empty-state { text-align:center; padding:50px 20px; color:var(--n300); font-size:14px; line-height:2; }

/* ── BOTTOM NAV ── */
#bottomNav {
  position:fixed; bottom:0; left:0; right:0; z-index:300;
  background:rgba(255,255,255,.96); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--t100); display:flex; max-width:480px; margin:0 auto;
}
.nav-btn {
  flex:1; padding:10px 4px 12px; background:none; border:none; cursor:pointer;
  font-family:var(--font); font-size:10px; font-weight:500; color:var(--n400);
  display:flex; flex-direction:column; align-items:center; gap:3px; transition:color .15s;
}
.nav-btn.on { color:var(--t500); }
.nav-icon { font-size:20px; line-height:1; }
.nav-dot {
  width:4px; height:4px; border-radius:50%; background:var(--t400);
  margin-top:1px; opacity:0; transition:opacity .15s;
}
.nav-btn.on .nav-dot { opacity:1; }

/* ── MISC ── */
.last-sync-bar {
  text-align:center; font-size:10.5px; color:var(--n300);
  padding:6px 0 10px; display:flex; align-items:center; justify-content:center; gap:5px;
}
.sync-ok { color:var(--success); }
.sync-warn { color:var(--warn); }

/* ── CONFIRM MODAL ── */
#confirmModal {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(28,58,56,.4); backdrop-filter:blur(4px);
  align-items:flex-end; justify-content:center;
}
#confirmModal.show { display:flex; }
.modal-box {
  background:#fff; border-radius:var(--r-lg) var(--r-lg) 0 0;
  padding:24px 20px 32px; width:100%; max-width:480px;
  animation:slideUp .25s cubic-bezier(.22,1,.36,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-title { font-size:16px; font-weight:700; color:var(--n800); margin-bottom:8px; }
.modal-sub { font-size:13px; color:var(--n400); margin-bottom:20px; line-height:1.6; }
.modal-actions { display:flex; gap:10px; }
.btn-modal {
  flex:1; padding:12px; border-radius:var(--r-sm); border:none;
  font-size:14px; font-weight:700; font-family:var(--font); cursor:pointer; transition:all .15s;
}
.btn-modal.cancel { background:var(--n100); color:var(--n600); }
.btn-modal.confirm-del { background:#FEE2E2; color:#DC2626; }
.btn-modal:active { transform:scale(.97); }
</style>
</head>
<body>

<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="tb-left">
      <h1>⏱ TimeTrack Pro</h1>
      <div class="tb-sub">
        <span class="live-dot" id="liveDot"></span>
        <span id="syncStatus">กำลังเชื่อมต่อ...</span>
      </div>
    </div>
    <div>
      <button class="btn-sync" id="syncBtn" onclick="APP.sync()">
        <span id="syncIco">↻</span> Sync
      </button>
    </div>
  </div>

  <!-- TAB BAR -->
  <div id="tabBar">
    <button class="tab-btn on" onclick="APP.tab('add')">+ บันทึก</button>
    <button class="tab-btn"   onclick="APP.tab('list')">รายการ</button>
    <button class="tab-btn"   onclick="APP.tab('daily')">รายวัน</button>
    <button class="tab-btn"   onclick="APP.tab('monthly')">รายเดือน</button>
  </div>

  <!-- PAGE: ADD -->
  <div id="page-add" class="page on">
    <div class="card">
      <div class="card-head">บันทึกเวลาทำงาน <span class="badge" id="todayType">-</span></div>

      <!-- Edit mode banner -->
      <div id="editBanner">
        <span>✏️ โหมดแก้ไข — กำลังแก้ไขวันที่ <span id="editDateLabel"></span></span>
        <button class="btn-cancel-edit" onclick="APP.cancelEdit()">ยกเลิก</button>
      </div>

      <div class="row1">
        <div class="fg"><label>วันที่</label>
          <input type="date" id="fDate" oninput="APP.updatePreview()">
        </div>
      </div>
      <div class="row2">
        <div class="fg"><label>เวลาเข้า</label>
          <input type="time" id="fIn" value="09:00" oninput="APP.updatePreview()">
        </div>
        <div class="fg"><label>เวลาออก</label>
          <input type="time" id="fOut" value="18:00" oninput="APP.updatePreview()">
        </div>
      </div>
      <div class="row2">
        <div class="fg"><label>OT เพิ่มเติม (฿)</label>
          <input type="number" id="fCustom" placeholder="0" oninput="APP.updatePreview()">
        </div>
        <div class="fg"><label>ค่าเดินทางพิเศษ (฿)</label>
          <input type="number" id="fSpecial" placeholder="0" oninput="APP.updatePreview()">

<script>
'use strict';

/* ── CONFIG ── */
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbzpodRB6pV0c0We6QdFUcGnKTz7U-6OdPV0sYf0b16VjSm6eSNE689XPd3Krihn2nH5/exec',
  SYNC_INTERVAL_MS: 60000,
  LOCAL_KEY: 'ttp_v2',
  VERSION: '2.1.0'
};

const DEFAULT_CFG = {
  SALARY: 17000, ALLOWANCE: 2000, SOCIAL_SEC: 850,
  TRANSPORT: 200, FIRST_PAYMENT: 16150,
  OT100_RATE: 100, OT150_RATE: 150, OT200_RATE: 200,
  OT100_START: 18
};

let STATE = {
  holidays: [], config: { ...DEFAULT_CFG },
  sheetRecords: [], localRecs: [],
  lastSync: null, syncOK: false,
  currentPage: 'add', selectedPeriod: null,
  editingDate: null,   // date being edited (original date before delete)
  autoSyncTimer: null
};

/* ── STORAGE ── */
function loadLocal() {
  try {
    const raw = localStorage.getItem(CONFIG.LOCAL_KEY);
    if (raw) STATE.localRecs = JSON.parse(raw).localRecs || [];
  } catch(e) { STATE.localRecs = []; }
}
function saveLocal() {
  try {
    localStorage.setItem(CONFIG.LOCAL_KEY, JSON.stringify({
      localRecs: STATE.localRecs, _v: CONFIG.VERSION
    }));
  } catch(e) {}
}

/* ── OT CALCULATION ── */
function toDecimal(t) {
  if (!t) return 0;
  let s = t.toString();
  if (s.includes('T')) s = s.split('T')[1].substring(0, 5);
  const parts = s.split(':');
  if (parts.length < 2) return 0;
  return parseInt(parts[0], 10) + (parseInt(parts[1], 10) / 60);
}

function getDayType(dateStr) {
  if (!dateStr) return 'normal';
  const cleanDate = dateStr.toString().split('T')[0];
  if (STATE.holidays && STATE.holidays.includes(cleanDate)) return 'holiday';
  const d = new Date(cleanDate + 'T00:00:00');
  if (d.getDay() === 3) return 'wednesday';
  return 'normal';
}

function calcOT(rec) {
  const C = STATE.config || DEFAULT_CFG;
  const OT100 = parseFloat(C.OT100_RATE) || 100;
  const OT150 = parseFloat(C.OT150_RATE) || 150;
  const OT200 = parseFloat(C.OT200_RATE) || 200;
  const TRANS  = parseFloat(C.TRANSPORT)  || 200;

  let inTime  = toDecimal(rec.timeIn);
  let outTime = toDecimal(rec.timeOut);
  if (outTime <= inTime) outTime += 24;

  const type = getDayType(rec.date);
  let t100 = 0, t150 = 0, t200 = 0, transport = 0;

  if (type === 'normal') {
    t100 = Math.max(0, Math.min(outTime, 23) - Math.max(inTime, 18));
    t150 = Math.max(0, Math.min(outTime, 9) - inTime) + Math.max(0, outTime - Math.max(inTime, 23));
  } else if (type === 'wednesday') {
    t150 = outTime - inTime;
  } else if (type === 'holiday') {
    t150 = Math.max(0, Math.min(outTime, 23) - Math.max(inTime, 9));
    t200 = Math.max(0, Math.min(outTime, 9) - inTime) + Math.max(0, outTime - Math.max(inTime, 23));
  }

  if (outTime >= 23) transport = TRANS;

  const custom  = parseFloat(rec.customOT)         || 0;
  const special = parseFloat(rec.specialTransport) || 0;
  const b100 = t100 * OT100;
  const b150 = t150 * OT150;
  const b200 = t200 * OT200;
  const otTotal = b100 + b150 + b200 + custom;

  return {
    type,
    t100, t150, t200,
    b100, b150, b200,
    tr: transport,
    custom,
    special,
    otTotal,
    total: otTotal + transport + special
  };
}
/* ── MERGE RECORDS ── */
function mergeAll() {
  const map = new Map();
  // รวบรวมข้อมูลทั้งหมดที่มี (ทั้งจาก Sheet และ Local)
  const allData = [...STATE.localRecs, ...STATE.sheetRecords];
  
  allData.forEach(r => {
    // ตัดเวลาทิ้ง เหลือแต่วันที่ YYYY-MM-DD
    let d = r.date.toString().split('T')[0].trim();
    // เก็บลง Map เพื่อป้องกันข้อมูลซ้ำ
    map.set(d, { ...r, date: d });
  });
  
  // เรียงลำดับจากวันที่ล่าสุดขึ้นก่อน (b เทียบกับ a)
  return Array.from(map.values()).sort((a, b) => a.date.localeCompare(b.date));
}
/* ── HELPER FUNCTIONS ── */
function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function fmtBaht(n) {
  return '฿' + Math.round(n).toLocaleString('th-TH');
}
function fmtHr(h) {
  return h.toFixed(2) + ' ชม';
}
function dayName(dateStr) {
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  try { return days[new Date(dateStr + 'T00:00:00').getDay()]; } catch(e) { return ''; }
}
function getPeriod(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const year = d.getFullYear(), month = d.getMonth() + 1, day = d.getDate();
  if (day >= 26) {
    const nm = month === 12 ? 1 : month + 1;
    const ny = month === 12 ? year + 1 : year;
    return `${ny}-${String(nm).padStart(2,'0')}`;
  }
  return `${year}-${String(month).padStart(2,'0')}`;
}
function periodLabel(p) {
  const [year, month] = p.split('-');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${months[parseInt(month)-1]} ${parseInt(year) + 543}`;
}
async function fetchWithTimeout(url, options = {}, timeout = 15000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), timeout);
  try {
    const res = await fetch(url, { ...options, signal: ctrl.signal });
    clearTimeout(id); return res;
  } catch(e) { clearTimeout(id); throw e; }
}
function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
}

/* ── EDIT RECORD ── */
async function editRec(date) {
  const records = mergeAll();
  const rec = records.find(r => r.date === date);
  if (!rec) { toast('ไม่พบข้อมูล', 'err'); return; }

  // Fill the form
  document.getElementById('fDate').value = rec.date;
  document.getElementById('fIn').value = rec.timeIn;
  document.getElementById('fOut').value = rec.timeOut;
  document.getElementById('fCustom').value = rec.customOT || '';
  document.getElementById('fSpecial').value = rec.specialTransport || '';

  // Mark as editing
  STATE.editingDate = date;

  // Show edit banner
  document.getElementById('editDateLabel').textContent = date;
  document.getElementById('editBanner').classList.add('show');
  document.getElementById('btnSaveIcon').textContent = '✎';
  document.getElementById('btnSaveText').textContent = 'บันทึกการแก้ไข';
  document.getElementById('btnSave').classList.add('edit-mode');

  // Navigate to add tab
  APP.tab('add');
  APP.updatePreview();

  // Scroll to top of add card
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Delete the original record (will be re-created on save)
  STATE.localRecs = STATE.localRecs.filter(r => r.date !== date);
  saveLocal();
  try {
    await fetchWithTimeout(CONFIG.GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'deleteByDate', date })
    });
    STATE.sheetRecords = STATE.sheetRecords.filter(r => r.date !== date);
  } catch(e) {
    STATE.sheetRecords = STATE.sheetRecords.filter(r => r.date !== date);
  }

  toast('แก้ไขข้อมูลวันที่ ' + date, 'ok');
}

/* ── DELETE RECORD ── */
function deleteRec(date) {
  document.getElementById('modalTitle').textContent = 'ยืนยันการลบ';
  document.getElementById('modalSub').textContent = `ลบข้อมูลวันที่ ${date} ใช่หรือไม่?`;
  document.getElementById('confirmModal').classList.add('show');
  document.getElementById('modalConfirmBtn').onclick = async () => {
    closeModal();
    STATE.localRecs = STATE.localRecs.filter(r => r.date !== date);
    saveLocal();
    try {
      await fetchWithTimeout(CONFIG.GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'deleteByDate', date })
      });
      STATE.sheetRecords = STATE.sheetRecords.filter(r => r.date !== date);
    } catch(e) {
      STATE.sheetRecords = STATE.sheetRecords.filter(r => r.date !== date);
    }
    renderList(); renderDaily(); renderMonthly();
    toast('ลบแล้ว ✓', 'ok');
  };
}

/* ── MAIN APP OBJECT ── */
const APP = {

  async sync(showToast = true) {
    const btn = document.getElementById('syncBtn');
    const ico = document.getElementById('syncIco');
    btn.classList.add('busy'); ico.classList.add('spin');
    document.getElementById('syncStatus').textContent = 'กำลังซิงค์...';
    document.getElementById('liveDot').style.background = '#FBD044';

    try {
      const [cfgRes, dataRes] = await Promise.all([
        fetchWithTimeout(CONFIG.GAS_URL, { method:'POST', body:JSON.stringify({action:'getConfig'}) }),
        fetchWithTimeout(CONFIG.GAS_URL)
      ]);
      const cfgJson = await cfgRes.json();
      const dataJson = await dataRes.json();

      if (cfgJson.success) {
        STATE.holidays = cfgJson.data.holidays || [];
        const { holidays:_, ...cfgOnly } = cfgJson.data;
        STATE.config = { ...DEFAULT_CFG, ...cfgOnly };
      }
      if (Array.isArray(dataJson)) {
        STATE.sheetRecords = dataJson.filter(r => r.date && r.timeIn && r.timeOut);
      }

      STATE.lastSync = new Date(); STATE.syncOK = true;
      document.getElementById('liveDot').style.background = '#34D399';
      document.getElementById('syncStatus').textContent = `ซิงค์แล้ว ${STATE.sheetRecords.length} รายการ`;
      this._afterSync();
      if (showToast) toast('ซิงค์สำเร็จ ✓', 'ok');

    } catch(e) {
      STATE.syncOK = false;
      document.getElementById('liveDot').style.background = '#F87171';
      document.getElementById('syncStatus').textContent = 'ออฟไลน์ — ใช้ข้อมูล Local';
      this._afterSync();
      if (showToast) toast('ซิงค์ไม่ได้ ใช้ข้อมูล Local', 'err');
    }

    btn.classList.remove('busy'); ico.classList.remove('spin');
    this._updateLastSyncBar();
  },

  _afterSync() {
    renderHolidayChips(); renderConfigCard();
    renderList(); renderDaily(); renderMonthly();
  },

  _updateLastSyncBar() {
    const el = document.getElementById('lastSyncBar');
    if (!STATE.lastSync) { el.textContent = '—'; return; }
    const t = STATE.lastSync.toLocaleTimeString('th-TH');
    const cls = STATE.syncOK ? 'sync-ok' : 'sync-warn';
    el.innerHTML = `<span class="${cls}">● ซิงค์ล่าสุด: ${t}</span>&nbsp;
      ${STATE.sheetRecords.length} รายการใน Sheets | Local ${STATE.localRecs.length} รายการ`;
  },

  tab(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
    document.getElementById('page-' + name).classList.add('on');
    document.getElementById('nav-' + name).classList.add('on');
    const idx = ['add','list','daily','monthly'].indexOf(name);
    if (idx >= 0) document.querySelectorAll('.tab-btn')[idx].classList.add('on');
    STATE.currentPage = name;
    if (name === 'list') renderList();
    if (name === 'daily') renderDaily();
    if (name === 'monthly') renderMonthly();
  },

  cancelEdit() {
    STATE.editingDate = null;
    document.getElementById('editBanner').classList.remove('show');
    document.getElementById('btnSave').classList.remove('edit-mode');
    document.getElementById('btnSaveIcon').textContent = '＋';
    document.getElementById('btnSaveText').textContent = 'บันทึกข้อมูล';
    // reset form
    document.getElementById('fDate').value = todayStr();
    document.getElementById('fIn').value = '09:00';
    document.getElementById('fOut').value = '18:00';
    document.getElementById('fCustom').value = '';
    document.getElementById('fSpecial').value = '';
    document.getElementById('previewBox').style.display = 'none';
    // Restore from sheet
    APP.sync(false);
  },

  updatePreview() {
    const date = document.getElementById('fDate').value;
    const tin = document.getElementById('fIn').value;
    const tout = document.getElementById('fOut').value;

    if (date) {
      const t = getDayType(date);
      const lbl = {normal:'ปกติ',wednesday:'พุธ',holiday:'นักขัตฤกษ์'}[t];
      const el = document.getElementById('todayType');
      el.textContent = lbl;
      el.style.background = t==='normal'?'var(--t100)':t==='wednesday'?'var(--amber)':'var(--rose)';
      el.style.color = t==='normal'?'var(--t600)':t==='wednesday'?'#8A5F00':'#9D1761';
    }
    if (!date || !tin || !tout) return;

    const rec = { date, timeIn:tin, timeOut:tout,
      customOT: document.getElementById('fCustom').value,
      specialTransport: document.getElementById('fSpecial').value };
    const c = calcOT(rec);
    const typeLabel = {normal:'วันปกติ',wednesday:'วันพุธ',holiday:'วันหยุดนักขัตฤกษ์'}[c.type];

    document.getElementById('pvType').textContent = typeLabel;
    document.getElementById('pvType').className = 'pv-type ' + c.type;
    document.getElementById('pvOT').textContent = c.otTotal > 0 ? `OT ${fmtBaht(c.otTotal)}` : '';
    document.getElementById('pvTot').textContent = `รวม ${fmtBaht(c.total)}`;

    const details = [];
    if (c.t100 > 0) details.push(`OT×1 ${fmtHr(c.t100)} = ${fmtBaht(c.b100)}`);
    if (c.t150 > 0) details.push(`OT×1.5 ${fmtHr(c.t150)} = ${fmtBaht(c.b150)}`);
    if (c.t200 > 0) details.push(`OT×2 ${fmtHr(c.t200)} = ${fmtBaht(c.b200)}`);
    if (c.tr > 0) details.push(`🚗 ${fmtBaht(c.tr)}`);
    if (c.custom > 0) details.push(`Custom ${fmtBaht(c.custom)}`);
    document.getElementById('pvDetail').textContent = details.join('  ·  ');
    document.getElementById('previewBox').style.display = 'block';
  },

  async save() {
    const date = document.getElementById('fDate').value;
    const tin = document.getElementById('fIn').value;
    const tout = document.getElementById('fOut').value;
    if (!date || !tin || !tout) { toast('กรุณากรอกข้อมูลให้ครบ', 'err'); return; }

    // Check duplicate only if NOT editing same date
    const existing = mergeAll().find(r => r.date === date);
    if (existing) { toast(`วันที่ ${date} มีข้อมูลอยู่แล้ว`, 'err'); return; }

    const rec = {
      id: Date.now(), date, timeIn: tin, timeOut: tout,
      customOT: +document.getElementById('fCustom').value || 0,
      specialTransport: +document.getElementById('fSpecial').value || 0,
      _local: true
    };

    STATE.localRecs.push(rec);
    saveLocal();

    const isEdit = !!STATE.editingDate;
    toast(isEdit ? 'กำลังบันทึกการแก้ไข...' : 'บันทึก Local แล้ว กำลังส่ง Sheets...', 'ok');

    const btn = document.getElementById('btnSave');
    btn.classList.add('loading');

    try {
      const res = await fetchWithTimeout(CONFIG.GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action:'append', records:[rec] })
      });
      const j = await res.json();
      if (j.success) {
        toast(isEdit ? 'แก้ไขสำเร็จ ✓' : 'บันทึกสำเร็จ ✓', 'ok');
        await this.sync(false);
        // ลบจาก local หลัง sync เสร็จแล้วเท่านั้น ป้องกันข้อมูลหาย
        STATE.localRecs = STATE.localRecs.filter(r => r.id !== rec.id);
        saveLocal();
        renderList(); renderDaily(); renderMonthly();
      } else {
        toast('บันทึก Local (Sheets: ' + j.message + ')', 'err');
      }
    } catch(e) {
      toast(isEdit ? 'แก้ไขสำเร็จ (Local)' : 'บันทึก Local สำเร็จ (ออฟไลน์)', 'ok');
      renderList(); renderDaily(); renderMonthly();
    }

    btn.classList.remove('loading');

    // Reset edit mode
    STATE.editingDate = null;
    document.getElementById('editBanner').classList.remove('show');
    document.getElementById('btnSave').classList.remove('edit-mode');
    document.getElementById('btnSaveIcon').textContent = '＋';
    document.getElementById('btnSaveText').textContent = 'บันทึกข้อมูล';

    // Reset form
    document.getElementById('fDate').value = todayStr();
    document.getElementById('fIn').value = '09:00';
    document.getElementById('fOut').value = '18:00';
    document.getElementById('fCustom').value = '';
    document.getElementById('fSpecial').value = '';
    document.getElementById('previewBox').style.display = 'none';
  }
};

/* ── RENDER: HOLIDAY CHIPS ── */
function renderHolidayChips() {
  const el = document.getElementById('hdChips');
  const cnt = document.getElementById('hdCount');
  const h = STATE.holidays;
  cnt.textContent = h.length + ' วัน';
  if (!h.length) { el.innerHTML = '<span style="font-size:12px;color:var(--n400)">ไม่มีข้อมูล</span>'; return; }
  el.innerHTML = h.slice().sort().map(d => `<span class="hchip">${d} (${dayName(d)})</span>`).join('');
}

/* ── RENDER: CONFIG ── */
function renderConfigCard() {
  const C = STATE.config;
  const rows = [
    ['เงินเดือน', fmtBaht(C.SALARY)], ['เบี้ยขยัน', fmtBaht(C.ALLOWANCE)],
    ['ประกันสังคม', fmtBaht(C.SOCIAL_SEC)], ['งวดแรก', fmtBaht(C.FIRST_PAYMENT)],
    ['ค่าเดินทาง (ดึก)', fmtBaht(C.TRANSPORT)], ['OT×1.0 ต่อชม', fmtBaht(C.OT100_RATE)],
    ['OT×1.5 ต่อชม', fmtBaht(C.OT150_RATE)], ['OT×2.0 ต่อชม', fmtBaht(C.OT200_RATE)],
    ['OT เริ่มที่', C.OT100_START + ':00 น.'],
  ];
  document.getElementById('cfgContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;">
      ${rows.map(([k,v]) => `
        <span style="color:var(--n400);font-size:11px;">${k}</span>
        <span style="font-weight:700;font-size:12px;text-align:right;">${v}</span>
      `).join('')}
    </div>`;
}

/* ── RENDER: LIST ── */
function renderList() {
  const el = document.getElementById('listContent');
  if (!el) return;

  const records = mergeAll(); // เรียงจากเก่าไปใหม่ (ascending)

  if (!records.length) {
    el.innerHTML = '<div class="empty-state">ยังไม่มีข้อมูล<br>เพิ่มในแท็บ "+ บันทึก"</div>';
    return;
  }

  let html = '';
  records.forEach(rec => {
    const c = calcOT(rec);
    const tc = c.type;
    const typePill = {normal:'ปกติ', wednesday:'พุธ', holiday:'หยุด'}[tc] || 'ปกติ';
    html += `<div class="rec ${tc}">
      <div class="rec-top">
        <div class="rec-left">
          <div class="rec-date">${rec.date} ${rec._local ? '<span class="src-pill">Local</span>' : ''}</div>
          <div class="rec-meta">
            <span>${dayName(rec.date)}</span>
            <span class="type-pill ${tc}">${typePill}</span>
            <span>${rec.timeIn} – ${rec.timeOut}</span>
          </div>
        </div>
        <div class="rec-right">
          <div class="rec-total">${fmtBaht(c.total)}</div>
          ${c.otTotal > 0 ? `<div class="rec-ot-sub">OT ${fmtBaht(c.otTotal)}</div>` : ''}
        </div>
      </div>
      <div class="rec-detail">
        <div class="dc"><div class="dk">OT×1.0</div><div class="dv">${c.t100.toFixed(2)} ชม</div></div>
        <div class="dc"><div class="dk">OT×1.5</div><div class="dv">${c.t150.toFixed(2)} ชม</div></div>
        <div class="dc"><div class="dk">OT×2.0</div><div class="dv">${c.t200.toFixed(2)} ชม</div></div>
      </div>
      ${(c.tr > 0 || c.custom > 0 || c.special > 0) ? `<div class="rec-pills">
        ${c.tr > 0 ? `<span class="pill tr">🚗 ${fmtBaht(c.tr)}</span>` : ''}
        ${c.custom > 0 ? `<span class="pill ct">⚡ Custom ${fmtBaht(c.custom)}</span>` : ''}
        ${c.special > 0 ? `<span class="pill sp">🚐 พิเศษ ${fmtBaht(c.special)}</span>` : ''}
      </div>` : ''}
      <div class="rec-actions">
        <button class="btn-act edit" onclick="editRec('${rec.date}')">✎ แก้ไข</button>
        <button class="btn-act del" onclick="deleteRec('${rec.date}')">🗑 ลบ</button>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

/* ── RENDER: DAILY ── */
function renderDaily() {
  const el = document.getElementById('dailyContent');
  const records = mergeAll();
  if (!records.length) { el.innerHTML = '<div class="empty-state">ยังไม่มีข้อมูล</div>'; return; }

  const groups = {};
  records.forEach(r => {
    const p = getPeriod(r.date);
    if (!groups[p]) groups[p] = [];
    groups[p].push(r);
  });

  let html = '';
  Object.keys(groups).sort().reverse().forEach(p => {
    const recs = groups[p];
    const periodTotal = recs.reduce((s, r) => s + calcOT(r).total, 0);
    html += `<div class="period-block">
      <div class="period-hd">
        <div class="period-name">รอบ ${periodLabel(p)}</div>
        <div class="period-sum">${fmtBaht(periodTotal)}</div>
      </div>
      <div class="daily-list">`;

    recs.forEach(r => {
      const c = calcOT(r);
      const typeLabel = {normal:'ปกติ',wednesday:'พุธ',holiday:'หยุด'}[c.type];
      const typeColor = {normal:'var(--t500)',wednesday:'var(--amberDk)',holiday:'var(--roseDk)'}[c.type];
      const breakdown = [];
      if (c.t100 > 0) breakdown.push(`OT×1 ${c.t100.toFixed(2)}ชม`);
      if (c.t150 > 0) breakdown.push(`OT×1.5 ${c.t150.toFixed(2)}ชม`);
      if (c.t200 > 0) breakdown.push(`OT×2 ${c.t200.toFixed(2)}ชม`);
      if (c.tr > 0) breakdown.push(`🚗 ${fmtBaht(c.tr)}`);

      html += `<div class="daily-item">
        <div class="di-left">
          <div class="di-date">${r.date} <span style="font-size:11px;color:${typeColor};font-weight:700;">${typeLabel}</span></div>
          <div class="di-sub">
            <span>${dayName(r.date)}</span><span>•</span><span>${r.timeIn} – ${r.timeOut}</span>
            ${r._local ? '<span class="src-pill">Local</span>' : ''}
          </div>
          ${breakdown.length ? `<div style="font-size:10.5px;color:var(--n400);margin-top:3px;">${breakdown.join('  ·  ')}</div>` : ''}
        </div>
        <div class="di-right">
          <div class="di-total">${fmtBaht(c.total)}</div>
          ${c.otTotal > 0 ? `<div class="di-ot">OT ${fmtBaht(c.otTotal)}</div>` : ''}
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

/* ── RENDER: MONTHLY ── */
function renderMonthly() {
  const records = mergeAll();
  const psEl = document.getElementById('periodSelect');
  const contEl = document.getElementById('monthlyContent');

  if (!records.length) {
    psEl.innerHTML = '';
    contEl.innerHTML = '<div class="empty-state">ยังไม่มีข้อมูล</div>';
    return;
  }

  const periodSet = new Set(records.map(r => getPeriod(r.date)));
  const periods = [...periodSet].sort().reverse();
  if (!STATE.selectedPeriod || !periodSet.has(STATE.selectedPeriod)) STATE.selectedPeriod = periods[0];

  psEl.innerHTML = periods.map(p =>
    `<button class="period-btn ${p===STATE.selectedPeriod?'on':''}" onclick="selectPeriod('${p}')">${periodLabel(p).split('(')[0].trim()}</button>`
  ).join('');

  const recs = records.filter(r => getPeriod(r.date) === STATE.selectedPeriod);
  let tot100=0,tot150=0,tot200=0,totCustom=0,totTrans=0,totSpecial=0;
  let normalDays=0,wedDays=0,holDays=0,totalOTHours=0;

  recs.forEach(r => {
    const c = calcOT(r);
    tot100+=c.b100; tot150+=c.b150; tot200+=c.b200; totCustom+=c.custom;
    totTrans+=c.tr; totSpecial+=c.special;
    if (c.type==='normal') normalDays++;
    else if (c.type==='wednesday') wedDays++;
    else holDays++;
    totalOTHours += c.t100+c.t150+c.t200;
  });

  const C = STATE.config;
  const SALARY=+C.SALARY||17000, ALLOWANCE=+C.ALLOWANCE||2000;
  const SOCIAL_SEC=+C.SOCIAL_SEC||850, FIRST_PMT=+C.FIRST_PAYMENT||16150;
  const totalOT=tot100+tot150+tot200+totCustom;
  const totalTrAll=totTrans+totSpecial;
  const grossSalary=SALARY+ALLOWANCE;
  const totalIncome=grossSalary+totalOT;
  const netAfterSoc=totalIncome-SOCIAL_SEC;
  const secondPmt=netAfterSoc-FIRST_PMT;
  const maxOTVal=Math.max(tot100,tot150,tot200,totCustom,1);
  const otItems=[
    {label:'OT×1.0',val:tot100,cls:'c100'},
    {label:'OT×1.5',val:tot150,cls:'c150'},
    {label:'OT×2.0',val:tot200,cls:'c200'},
    {label:'Custom',val:totCustom,cls:'ccustom'},
  ].filter(x=>x.val>0);

  contEl.innerHTML = `
    <div class="sum-grid">
      <div class="sum-tile accent full">
        <div class="st-label">รวมรายได้ทั้งหมด (ก่อนหักประกันสังคม)</div>
        <div class="st-val xl">${fmtBaht(totalIncome)}</div>
        <div style="color:rgba(255,255,255,.6);font-size:10.5px;margin-top:4px;">${recs.length} วันทำงาน · OT รวม ${totalOTHours.toFixed(2)} ชม</div>
      </div>
      <div class="sum-tile">
        <div class="st-label">OT รวม</div>
        <div class="st-val">${fmtBaht(totalOT)}</div>
      </div>
      <div class="sum-tile">
        <div class="st-label">ค่าเดินทางรวม</div>
        <div class="st-val">${fmtBaht(totalTrAll)}</div>
      </div>
      <div class="sum-tile">
        <div class="st-label">เงินหลังหักประกัน</div>
        <div class="st-val">${fmtBaht(netAfterSoc)}</div>
      </div>
      <div class="sum-tile">
        <div class="st-label">งวดสอง (คาดการณ์)</div>
        <div class="st-val" style="color:var(--t500)">${fmtBaht(secondPmt)}</div>
      </div>
    </div>

    ${otItems.length ? `
    <div class="sec-title">สัดส่วน OT</div>
    <div class="card">
      <div class="ot-bars">
        ${otItems.map(ot=>`
          <div class="ot-row">
            <div class="ot-lbl">${ot.label}</div>
            <div class="ot-track"><div class="ot-fill ${ot.cls}" style="width:${Math.round(ot.val/maxOTVal*100)}%"></div></div>
            <div class="ot-val">${fmtBaht(ot.val)}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <div class="sec-title">สัดส่วนวัน</div>
    <div class="card">
      <div class="dtype-row"><div class="dtype-left"><div class="dtype-dot" style="background:var(--t400)"></div>วันปกติ</div><div class="dtype-right">${normalDays} วัน</div></div>
      <div class="dtype-row"><div class="dtype-left"><div class="dtype-dot" style="background:var(--amberDk)"></div>วันพุธ</div><div class="dtype-right">${wedDays} วัน</div></div>
      <div class="dtype-row"><div class="dtype-left"><div class="dtype-dot" style="background:var(--roseDk)"></div>วันหยุดนักขัตฤกษ์</div><div class="dtype-right">${holDays} วัน</div></div>
      <div class="dtype-row" style="border-bottom:none"><div class="dtype-left"><div class="dtype-dot" style="background:var(--n300)"></div>รวม</div><div class="dtype-right">${recs.length} วัน</div></div>
    </div>

    <div class="sec-title">รายละเอียดรายได้</div>
    <div class="card">
      <table class="pay-table">
        <tr><td>เงินเดือน</td><td class="plus">${fmtBaht(SALARY)}</td></tr>
        <tr><td>เบี้ยขยัน</td><td class="plus">${fmtBaht(ALLOWANCE)}</td></tr>
        ${tot100>0?`<tr><td>OT×1.0</td><td class="plus">${fmtBaht(tot100)}</td></tr>`:''}
        ${tot150>0?`<tr><td>OT×1.5</td><td class="plus">${fmtBaht(tot150)}</td></tr>`:''}
        ${tot200>0?`<tr><td>OT×2.0</td><td class="plus">${fmtBaht(tot200)}</td></tr>`:''}
        ${totCustom>0?`<tr><td>OT Custom</td><td class="plus">${fmtBaht(totCustom)}</td></tr>`:''}
        ${totTrans>0?`<tr><td>ค่าเดินทาง (ดึก)</td><td class="plus">${fmtBaht(totTrans)}</td></tr>`:''}
        ${totSpecial>0?`<tr><td>ค่าเดินทางพิเศษ</td><td class="plus">${fmtBaht(totSpecial)}</td></tr>`:''}
        <tr class="hi"><td>รวมทั้งหมด</td><td>${fmtBaht(totalIncome)}</td></tr>
        <tr><td>หักประกันสังคม</td><td class="minus">-${fmtBaht(SOCIAL_SEC)}</td></tr>
        <tr class="hi"><td>คงเหลือหลังหัก</td><td>${fmtBaht(netAfterSoc)}</td></tr>
      </table>
    </div>

    <div class="sec-title">แบ่งงวดจ่าย</div>
    <div class="sum-grid" style="margin-bottom:20px">
      <div class="sum-tile">
        <div class="st-label">งวดแรก (กำหนด)</div>
        <div class="st-val">${fmtBaht(FIRST_PMT)}</div>
        <div class="st-note">จ่ายตามกำหนด</div>
      </div>
      <div class="sum-tile" style="border-color:var(--t400);">
        <div class="st-label">งวดสอง (คาดการณ์)</div>
        <div class="st-val" style="color:var(--t500)">${fmtBaht(secondPmt)}</div>
        <div class="st-note">สุทธิ - งวดแรก</div>
      </div>
    </div>`;
}

/* ── HELPERS ── */
function selectPeriod(p) { STATE.selectedPeriod = p; renderMonthly(); }

let _toastTimer = null;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ── BOOT ── */
(async function init() {
  loadLocal();
  document.getElementById('fDate').value = todayStr();
  renderList(); renderDaily(); renderMonthly();
  await APP.sync(false);
  STATE.autoSyncTimer = setInterval(() => APP.sync(false), CONFIG.SYNC_INTERVAL_MS);

  ['fDate','fIn','fOut'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => APP.updatePreview());
  });
  ['fCustom','fSpecial'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => APP.updatePreview());
  });
  APP.updatePreview();
})();
</script>
</body>
</html>
