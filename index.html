<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱️ Time Tracking PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans Thai';background:linear-gradient(135deg,#fed7aa,#fce7f3,#dbeafe);}
.container{max-width:520px;margin:auto;padding:16px;}
.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;}
input{width:100%;padding:10px;margin:5px 0;border:2px solid #fed7aa;border-radius:8px;}
button{width:100%;padding:10px;border:none;border-radius:8px;margin-top:5px;font-weight:700;}
.add{background:#ea580c;color:#fff;}
.sync{background:#22c55e;color:#fff;}
.record{background:#fff;border-left:6px solid #fed7aa;padding:10px;margin-top:6px;border-radius:8px;}
.wednesday{background:#fffbeb;border-left-color:#f59e0b;}
.holiday{background:#fffacd;border-left-color:#facc15;}
.summary{background:#eef2ff;border:2px solid #7c3aed;padding:10px;border-radius:10px;margin-top:10px;text-align:center;font-weight:700;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<input type="date" id="date">
<input type="time" id="in" value="09:00">
<input type="time" id="out" value="18:00">
<input type="number" id="custom" placeholder="OT เพิ่ม">
<input type="number" id="special" placeholder="ค่าเดินทางพิเศษ">
<button class="add" onclick="add()">+ เพิ่ม</button>
<button class="sync" onclick="sync()">Sync</button>
</div>

<div id="list"></div>

</div>

<script>

const WEB_APP_URL = "ใส่ URL /exec ของมึงตรงนี้";

let db = JSON.parse(localStorage.getItem("db")) || [];
let HOLIDAYS = [];
let CONFIG = {};

function t(v){let[a,b]=v.split(":");return +a+(b/60)}

function dayType(d){
 if(HOLIDAYS.includes(d)) return "holiday";
 if(new Date(d).getDay()==3) return "wednesday";
 return "normal";
}

function calc(r){
 let i=t(r.in),o=t(r.out);
 if(o<i)o+=24;

 let t100=0,t150=0,t200=0,tr=0;

 let type=dayType(r.date);

 if(type==="normal"){
  t100=Math.max(0,Math.min(o,23)-Math.max(i,18));
  if(i<9)t150+=(9-i);
  if(o>23)t150+=(o-23);
 }

 if(type!=="normal"){
  t150=Math.max(0,Math.min(o,23)-Math.max(i,9));
  if(i<9)t200+=(9-i);
  if(o>23)t200+=(o-23);
 }

 if(o>=23) tr=200;

 return {
  total:
  t100*100+
  t150*150+
  t200*200+
  (r.custom||0)+
  tr+
  (r.special||0)
 };
}

function add(){
 if(!date.value || !in.value || !out.value){
  alert("กรอกให้ครบ");
  return;
 }

 db.push({
  id:Date.now(),
  date:date.value,
  in:in.value,
  out:out.value,
  custom:+custom.value||0,
  special:+special.value||0
 });

 localStorage.setItem("db",JSON.stringify(db));
 render();
}

async function sync(){
 try{
  const res = await fetch(WEB_APP_URL,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:"append",
      records:db
    })
  });

  const json = await res.json();

  if(json.success){
    alert("✅ sync สำเร็จ");
  }else{
    alert("❌ "+json.message);
  }

 }catch(e){
  alert("❌ ใช้ local");
 }
}

async function load(){
 try{
  const res = await fetch(WEB_APP_URL,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:"getAll"})
  });

  const json = await res.json();

  if(json.success){
    HOLIDAYS = json.holidays;
    CONFIG = json.config;
    db = json.records;
    localStorage.setItem("db",JSON.stringify(db));
  }

 }catch(e){
  console.log("ใช้ local");
 }

 render();
}

function render(){
 let html="";
 let sum=0;

 db.forEach(r=>{
  let c=calc(r);
  sum+=c.total;

  html+=`
  <div class="record ${dayType(r.date)}">
  ${r.date}<br>
  ${r.in}-${r.out}<br>
  💰 ${c.total}
  </div>`;
 });

 html+=`<div class="summary">รวม ฿${sum}</div>`;
 list.innerHTML=html;
}

date.value=new Date().toISOString().split("T")[0];
load();

</script>
</body>
</html>
